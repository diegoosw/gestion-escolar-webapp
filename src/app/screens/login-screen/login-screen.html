<section class="login-new">
  <div class="login-container">
    <div class="login-form-section">
      <div class="login-brand">
        <img src="assets/images/escudoB.png" alt="escudo BUAP" class="logo-buap">
        <span class="brand-title">Sistema Escolar</span>
      </div>
      <h2 class="login-title">Iniciar Sesión</h2>
      <p class="login-subtitle">Ingresa los datos que registraste</p>
      <form (ngSubmit)="login()" class="login-form" #form="ngForm">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          
          <input type="email" [(ngModel)]="username" name="username" class="form-control" id="email" placeholder="nombre@correo.com" autocomplete="username">
          <div *ngIf="errors.username" class="invalid-feedback">{{ errors.username }}</div><!-- PREGUNTA DE EXAMEN ¿CÓMO IMPRIRMIR UNA VARIABLE? - USAR DOBLES LLAVES -->
          

        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" [(ngModel)]="password" name="password_user" class="form-control pwd" id="password" placeholder="Mínimo 8 caracteres" autocomplete="current-password" (keyup.enter)="login()" style="padding-right: 40px;">

          <span class="show-password" (click)="showPassword()" style="position:absolute; right: 18px; top: 50%; transform: translateY(-50%);">
            <i [ngClass]="type == 'password' ? 'bi bi-eye-fill' : 'bi bi-eye-slash-fill'"></i><!-- ES UN IF PARA MOSTRAR/OCULTAR CONTRASEÑA -->

          </span>

          <div *ngIf="errors.password" class="invalid-feedback">{{ errors.password }}</div>
        </div>
        <!-- se agreba el label de olvidé mi contraseña -->
        <div class="form-links">
          <a (click)="router.navigate(['olvide-contrasena'])">¿Olvidaste tu contraseña?</a>
        </div>
        <!-- botón para iniciar sesión -->
        <button class="btn-login" type="submit" [disabled]="load">Iniciar Sesión</button>

      </form>
    </div>
  </div>
</section>
